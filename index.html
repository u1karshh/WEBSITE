<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#050608">
  <link rel="manifest" href="/manifest.json">
  <title>Utkarsh Updates</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050608;
      color: #f5f7f1;
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    .message-wrap {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .heading {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      margin: 0;
      line-height: 1.2;
      color: #f5f7f1;
      text-transform: uppercase;
    }
    .today-date {
      margin-bottom: 12px;
      font-size: clamp(1.2rem, 2.8vw, 1.7rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.04em;
    }
    .live-time {
      margin-top: 4px;
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      font-size: clamp(1.05rem, 2.4vw, 1.5rem);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
      color: #ffffff;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
    .status {
      font-size: 0.95rem;
      color: #cfe4ea;
      opacity: 0.95;
    }
    .visitor-card {
      margin-top: 18px;
      width: min(560px, 100%);
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 36px rgba(0,0,0,0.2);
      text-align: left;
    }
    .visitor-card h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #7fd1ff;
    }
    .visitor-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }
    .visitor-item {
      font-size: 0.95rem;
      color: #f3f7fb;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }
    .visitor-item small {
      display: block;
      color: #9fc9d3;
      margin-top: 2px;
    }
    @media (max-width: 760px) {
      body { padding: 10px; align-items: flex-start; }
      .message-wrap { gap: 8px; }
      .heading { font-size: clamp(1.35rem, 6.8vw, 2.1rem); }
      .today-date { font-size: clamp(0.98rem, 3.6vw, 1.2rem); margin-bottom: 8px; }
      .live-time { font-size: clamp(0.95rem, 4vw, 1.2rem); padding: 8px 12px; }
    }
  </style>
</head>
<body>
  <div class="message-wrap">
    <h1 class="heading">UTKARSH IS WORKING ON THE WEBSITE</h1>
    <div id="today-date" class="today-date"><strong></strong></div>
    <div id="live-time" class="live-time">00:00:00.000</div>
    <div class="status">The landing page is back and ready.</div>

    <div class="visitor-card">
      <h2>Recent visitors</h2>
      <div id="visitor-list" class="visitor-list">
        <div class="visitor-item">Loading visitor IPs…</div>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    function updateClock() {
      const now = new Date();
      const date = now.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
      document.getElementById('today-date').innerHTML = `<strong>${date}</strong>`;
      const time = now.toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const ms = String(now.getMilliseconds()).padStart(3, '0');
      document.getElementById('live-time').textContent = `${time}.${ms}`;
    }

    updateClock();
    setInterval(updateClock, 1000);

    async function loadVisitors() {
      const list = document.getElementById('visitor-list');
      try {
        const response = await fetch('/visitors');
        if (!response.ok) throw new Error('Server error');
        const data = await response.json();
        const visitors = data.visitors || [];
        if (!visitors.length) {
          list.innerHTML = '<div class="visitor-item">No visitor IPs recorded yet.</div>';
          return;
        }

        list.innerHTML = visitors.map((visitor) => `
          <div class="visitor-item">
            <strong>${visitor.ip}</strong>
            <small>Visits: ${visitor.count} · Last seen: ${new Date(visitor.lastSeen).toLocaleString()}</small>
          </div>
        `).join('');
      } catch (error) {
        try {
          const ipResponse = await fetch('https://api.ipify.org?format=json');
          const ipData = await ipResponse.json();
          list.innerHTML = `
            <div class="visitor-item">
              <strong>${ipData.ip}</strong>
              <small>Your current public IP address</small>
            </div>
          `;
        } catch {
          list.innerHTML = '<div class="visitor-item">Unable to load visitor IPs right now.</div>';
        }
      }
    }

    async function trackVisit() {
      try {
        await fetch('/track-visit', { method: 'POST' });
      } catch (error) {
        // Ignore tracking errors.
      }
      loadVisitors();
    }

    trackVisit();
  </script>
</body>
</html>
