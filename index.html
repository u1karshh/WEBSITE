<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Website Update</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050608;
      color: #f5f7f1;
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    .message-wrap {
      text-align: center;
    }
    .today-date {
      margin-bottom: 12px;
      font-size: clamp(1.2rem, 2.8vw, 1.7rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.04em;
    }
    .announcement {
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 700;
      margin: 0;
      line-height: 1.55;
      color: #f5f7f1;
      font-family: Arial, sans-serif;
      max-width: 900px;
      display: inline-block;
      text-align: left;
    }
    .announcement .status-line {
      display: block;
      margin-bottom: 6px;
    }
    .announcement a {
      color: #7fd1ff;
      text-decoration: none;
    }
    .announcement a:hover {
      text-decoration: underline;
    }
    .live-time {
      margin-top: 16px;
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      font-size: clamp(1.05rem, 2.4vw, 1.5rem);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
      color: #ffffff;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
    .google-signin {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      background: #ffffff;
      color: #1a1a1a;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
      transition: transform 0.2s ease;
    }
    .google-signin:hover {
      transform: translateY(-2px);
    }
    .google-signin-wrapper {
      margin-top: 20px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="message-wrap">
    <div id="today-date" class="today-date"><strong></strong></div>
    <div id="announcement" class="announcement" aria-live="polite"></div>
    <div id="live-time" class="live-time">00:00:00.000</div>
    <div id="google-signin-wrapper" class="google-signin-wrapper"></div>
  </div>

  <script>
    const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
    const announcementData = {
      josaa: {
        label: 'JoSAA',
        url: 'https://josaa.nic.in/',
        status: 'Round 4 seat allocation result is available on the official portal.'
      },
      bitsat: {
        label: 'BITSAT',
        url: 'https://admissions.bits-pilani.ac.in/',
        status: 'Official BITS admissions portal is live for 2026 updates.'
      },
      mhtcet: {
        label: 'MHT-CET',
        url: 'https://cetcell.mahacet.org/',
        status: 'CAP registration is active, but no CAP round has started yet.'
      }
    };

    function updateAnnouncement() {
      const container = document.getElementById('announcement');
      if (!container) return;

      const html = Object.values(announcementData)
        .map(item => `<span class="status-line"><a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.label}</a>: ${item.status}</span>`)
        .join('');

      container.innerHTML = html;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('today-date').innerHTML = '<strong>15 Jul 2026</strong>';
      const time = now.toLocaleTimeString('en-GB', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      const ms = String(now.getMilliseconds()).padStart(3, '0');
      document.getElementById('live-time').textContent = `${time}.${ms}`;
    }

    function initGoogleSignIn() {
      const container = document.getElementById('google-signin-wrapper');
      if (!container) return;

      if (GOOGLE_CLIENT_ID.includes('YOUR_GOOGLE_CLIENT_ID')) {
        container.innerHTML = '<a class="google-signin" href="https://accounts.google.com/signin" target="_blank" rel="noopener noreferrer">Sign in with Google</a>';
        return;
      }

      if (window.google && window.google.accounts && window.google.accounts.id) {
        window.google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: (response) => {
            console.log('Google sign-in response:', response);
          }
        });

        window.google.accounts.id.renderButton(container, {
          theme: 'outline',
          size: 'large',
          text: 'signin_with',
          shape: 'pill'
        });
      }
    }

    updateClock();
    updateAnnouncement();
    setInterval(updateClock, 1);
    setInterval(updateAnnouncement, 600000);

    if (!GOOGLE_CLIENT_ID.includes('YOUR_GOOGLE_CLIENT_ID')) {
      const script = document.createElement('script');
      script.src = 'https://accounts.google.com/gsi/client';
      script.async = true;
      script.defer = true;
      script.onload = initGoogleSignIn;
      document.head.appendChild(script);
    } else {
      initGoogleSignIn();
    }
  </script>
</body>
</html>
