<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#050608">
  <link rel="manifest" href="/manifest.json">
  <title>Utkarsh Updates</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050608;
      color: #f5f7f1;
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    .message-wrap {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .heading {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      margin: 0;
      line-height: 1.2;
      color: #f5f7f1;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
    }
    .today-date {
      margin-bottom: 12px;
      font-size: clamp(1.2rem, 2.8vw, 1.7rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.04em;
    }
    .announcement {
      font-size: clamp(1rem, 2vw, 1.3rem);
      font-weight: 700;
      margin: 0;
      line-height: 1.55;
      color: #f5f7f1;
      font-family: Arial, sans-serif;
      max-width: 900px;
      display: inline-block;
      text-align: center;
    }
    .announcement .status-line {
      display: block;
      margin-bottom: 6px;
    }
    .announcement a {
      color: #7fd1ff;
      text-decoration: none;
    }
    .announcement a:hover {
      text-decoration: underline;
    }
    .live-time {
      margin-top: 4px;
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      font-size: clamp(1.05rem, 2.4vw, 1.5rem);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
      color: #ffffff;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="message-wrap">
    <h1 class="heading">UTKARSH IS WORKING ON THE WEBSITE</h1>
    <div id="today-date" class="today-date"><strong></strong></div>
    <div id="announcement" class="announcement" aria-live="polite"></div>
    <div id="live-time" class="live-time">00:00:00.000</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    const announcementData = {
      josaa: {
        label: 'JoSAA',
        url: 'https://josaa.nic.in/',
        status: 'Round 4 seat allocation result is available on the official portal.'
      },
      bitsat: {
        label: 'BITSAT',
        url: 'https://admissions.bits-pilani.ac.in/',
        status: 'Official BITS admissions portal is live for 2026 updates.'
      },
      mhtcet: {
        label: 'MHT-CET',
        url: 'https://cetcell.mahacet.org/',
        status: 'CAP registration is active, but no CAP round has started yet.'
      }
    };

    function updateAnnouncement() {
      const container = document.getElementById('announcement');
      if (!container) return;

      const html = Object.values(announcementData)
        .map(item => `<span class="status-line"><a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.label}</a>: ${item.status}</span>`)
        .join('');

      container.innerHTML = html;
    }

    function updateClock() {
      const now = new Date();
      const date = now.toLocaleDateString('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
      document.getElementById('today-date').innerHTML = `<strong>${date}</strong>`;
      const time = now.toLocaleTimeString('en-GB', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      const ms = String(now.getMilliseconds()).padStart(3, '0');
      document.getElementById('live-time').textContent = `${time}.${ms}`;
    }

    updateClock();
    updateAnnouncement();
    setInterval(updateClock, 1);
    setInterval(updateAnnouncement, 600000);

  </script>
</body>
</html>
