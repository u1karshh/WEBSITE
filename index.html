<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#050608">
  <link rel="manifest" href="/manifest.json">
  <title>Utkarsh Updates</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050608;
      color: #f5f7f1;
      font-family: Arial, sans-serif;
      padding: 24px;
    }
    .message-wrap {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .heading {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      margin: 0;
      line-height: 1.2;
      color: #f5f7f1;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
    }
    .today-date {
      margin-bottom: 12px;
      font-size: clamp(1.2rem, 2.8vw, 1.7rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.04em;
    }
    .live-time {
      margin-top: 4px;
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      font-size: clamp(1.05rem, 2.4vw, 1.5rem);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
      color: #ffffff;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }
    .games-shell {
      margin-top: 28px;
      width: min(900px, 100%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 16px 50px rgba(0,0,0,0.25);
    }
    .section-title {
      margin: 0 0 14px;
      font-size: clamp(1.15rem, 2.2vw, 1.45rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #ffffff;
    }
    .game-view {
      display: none;
      margin-top: 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(3,8,15,0.92);
      padding: 16px;
      min-height: 420px;
    }
    .game-view.visible {
      display: block;
    }
    .gate-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(2, 6, 12, 0.95);
      backdrop-filter: blur(8px);
    }
    .gate-card {
      width: min(560px, 100%);
      padding: 24px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(8, 16, 28, 0.95);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
      text-align: center;
    }
    .gate-eyebrow {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: #7fd1ff;
      font-size: 0.74rem;
      font-weight: 800;
    }
    .gate-title {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 3vw, 1.9rem);
      color: #ffffff;
    }
    .gate-copy {
      margin: 0 0 16px;
      color: #cfe4ea;
      line-height: 1.6;
    }
    .choice-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 12px;
    }
    .choice-grid.game-grid {
      grid-template-columns: 1fr;
    }
    .choice-card {
      border: 1px solid rgba(127,209,255,0.24);
      border-radius: 16px;
      background: rgba(127,209,255,0.12);
      color: #f2fdff;
      padding: 14px 12px;
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }
    .choice-card:hover, .choice-card.active {
      transform: translateY(-1px);
      background: rgba(127,209,255,0.24);
      border-color: #7fd1ff;
    }
    .gate-hint {
      margin-top: 14px;
      color: #8cced9;
      font-size: 0.95rem;
    }
    .hidden {
      display: none !important;
    }
    .game-intro {
      text-align: center;
      color: #cfe8f0;
      font-size: 1rem;
      line-height: 1.6;
      padding: 8px 0 12px;
    }
    .game-screen {
      display: block;
    }
    .game-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .game-panel-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .stat-pill {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      min-width: 220px;
    }
    .stat-pill strong {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #6fe4ff;
    }
    .stat-pill span {
      font-size: 0.84rem;
      color: #cfe6ee;
      line-height: 1.45;
    }
    .hud-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
    }
    .metric {
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
    }
    .metric .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: #8bd9f1;
      display: block;
      margin-bottom: 4px;
    }
    .metric .value {
      font-size: 1rem;
      font-weight: 800;
      color: #ffffff;
    }
    .message-line {
      font-size: 0.95rem;
      color: #cfe4ea;
      padding: 6px 0 2px;
    }
    .game-shell canvas {
      width: 100%;
      max-width: 720px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      background: linear-gradient(180deg, #07111d, #0c1725);
      touch-action: none;
    }
    .mobile-controls {
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .control-btn {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      background: rgba(127,209,255,0.18);
      color: #f2fdff;
      border: 1px solid rgba(127,209,255,0.32);
      cursor: pointer;
      min-width: 78px;
    }
    .control-btn:active {
      transform: scale(0.97);
      background: rgba(127,209,255,0.32);
    }
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      width: min(440px, 100%);
      margin: 0 auto;
    }
    .tile-cell {
      aspect-ratio: 1;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .tile-cell[data-value="2"] { background: #f6e7a6; color: #3f3300; }
    .tile-cell[data-value="4"] { background: #f1c76c; color: #3f3300; }
    .tile-cell[data-value="8"] { background: #f08b46; color: #fff; }
    .tile-cell[data-value="16"] { background: #ff6b4d; color: #fff; }
    .tile-cell[data-value="32"] { background: #ff4d6d; color: #fff; }
    .tile-cell[data-value="64"] { background: #c03dff; color: #fff; }
    .tile-cell[data-value="128"] { background: #4f7cff; color: #fff; }
    .tile-cell[data-value="256"] { background: #20b2aa; color: #fff; }
    .tile-cell[data-value="512"] { background: #2ecf7d; color: #fff; }
    .tile-cell[data-value="1024"] { background: #08a4f0; color: #fff; }
    .tile-cell[data-value="2048"] { background: #f7f7f7; color: #0c1424; }
    .btn-small {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      background: #7fd1ff;
      color: #04131d;
      cursor: pointer;
    }
    @media (max-width: 760px) {
      body {
        padding: 10px;
        align-items: flex-start;
      }
      .message-wrap {
        gap: 8px;
      }
      .heading {
        font-size: clamp(1.35rem, 6.8vw, 2.1rem);
      }
      .today-date {
        font-size: clamp(0.98rem, 3.6vw, 1.2rem);
        margin-bottom: 8px;
      }
      .live-time {
        font-size: clamp(0.95rem, 4vw, 1.2rem);
        padding: 8px 12px;
      }
      .games-shell {
        margin-top: 14px;
        padding: 12px;
        border-radius: 18px;
      }
      .game-view {
        padding: 10px;
        min-height: auto;
      }
      .game-panel-header {
        flex-direction: column;
      }
      .stat-pill {
        min-width: 0;
      }
      .mobile-controls {
        display: flex;
        justify-content: center;
      }
      .control-btn {
        min-width: 58px;
        padding: 8px 10px;
      }
      .tile-grid {
        gap: 8px;
        padding: 8px;
        width: min(100%, 320px);
      }
      .tile-cell {
        font-size: clamp(0.9rem, 4vw, 1.2rem);
      }
      .gate-card {
        padding: 18px;
        border-radius: 20px;
      }
      .gate-title {
        font-size: 1.35rem;
      }
      .gate-copy {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="message-wrap">
    <h1 class="heading">UTKARSH IS WORKING ON THE WEBSITE</h1>
    <div id="today-date" class="today-date"><strong></strong></div>
    <div id="live-time" class="live-time">00:00:00.000</div>
  </div>

  <div class="games-shell">
    <h2 class="section-title" id="section-title" style="display:none;">Choose a game</h2>
    <div id="game-view" class="game-view">
      <div id="game-intro" class="game-intro">Choose your device from the launch gate to begin.</div>
      <div id="game-screen" class="game-screen"></div>
    </div>
  </div>

  <div id="gate-overlay" class="gate-overlay">
    <div class="gate-card">
      <p class="gate-eyebrow">Launch gate</p>
      <h2 class="gate-title" id="gate-title">Are you on mobile or PC?</h2>
      <p class="gate-copy" id="gate-copy">Choose your setup first so I can enable the right controls.</p>
      <div class="choice-grid" id="device-choice">
        <button class="choice-card" data-device="mobile">Mobile</button>
        <button class="choice-card" data-device="pc">PC</button>
      </div>
      <div class="choice-grid game-grid hidden" id="game-choice">
        <button class="choice-card" data-game="2048">2048</button>
      </div>
      <div class="gate-hint" id="gate-hint">Mobile uses touch controls. PC uses keyboard and mouse.</div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }

    function updateClock() {
      const now = new Date();
      const date = now.toLocaleDateString('en-GB', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
      document.getElementById('today-date').innerHTML = `<strong>${date}</strong>`;
      const time = now.toLocaleTimeString('en-GB', {
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      const ms = String(now.getMilliseconds()).padStart(3, '0');
      document.getElementById('live-time').textContent = `${time}.${ms}`;
    }

    updateClock();
    setInterval(updateClock, 1000);

    const gameScreen = document.getElementById('game-screen');
    const gameIntro = document.getElementById('game-intro');
    const gameView = document.getElementById('game-view');
    const sectionTitle = document.getElementById('section-title');
    const gateOverlay = document.getElementById('gate-overlay');
    const gateTitle = document.getElementById('gate-title');
    const gateCopy = document.getElementById('gate-copy');
    const gateHint = document.getElementById('gate-hint');
    const deviceChoice = document.getElementById('device-choice');
    const gameChoice = document.getElementById('game-choice');
    const deviceButtons = Array.from(document.querySelectorAll('[data-device]'));
    const gameChoiceButtons = Array.from(document.querySelectorAll('#game-choice .choice-card'));
    let activeCleanup = () => {};
    let activeFrame = null;
    let selectedDevice = null;

    function clearGameScreen() {
      if (activeFrame) {
        cancelAnimationFrame(activeFrame);
        activeFrame = null;
      }
      activeCleanup();
      activeCleanup = () => {};
      gameScreen.innerHTML = '';
      gameIntro.style.display = 'block';
    }

    function showGateStep(step) {
      deviceChoice.classList.toggle('hidden', step !== 'device');
      gameChoice.classList.toggle('hidden', step !== 'game');
      if (step === 'device') {
        gateTitle.textContent = 'Are you on mobile or PC?';
        gateCopy.textContent = 'Choose your setup first so I can enable the right controls.';
        gateHint.textContent = 'Mobile uses touch controls. PC uses keyboard and mouse.';
      } else {
        gateTitle.textContent = 'Ready to play 2048?';
        gateCopy.textContent = 'Start the 2048 game for your chosen device and the board will appear instantly.';
        gateHint.textContent = selectedDevice === 'mobile'
          ? 'Touch controls are ready for phones and tablets.'
          : 'Keyboard and mouse controls are ready for desktop play.';
      }
    }

    deviceButtons.forEach(button => button.addEventListener('click', () => {
      selectedDevice = button.dataset.device;
      showGateStep('game');
    }));

    gameChoiceButtons.forEach(button => button.addEventListener('click', () => {
      gateOverlay.classList.add('hidden');
      sectionTitle.style.display = 'block';
      gameView.classList.add('visible');
      loadGame(button.dataset.game);
    }));

    function start2048Game() {
      gameIntro.style.display = 'none';
      gameScreen.innerHTML = `
        <div class="game-panel">
          <div class="game-panel-header">
            <div class="stat-pill">
              <strong>2048</strong>
              <span>Combine matching tiles to reach the 2048 tile and beyond.</span>
            </div>
            <div class="stat-pill">
              <strong>Controls</strong>
              <span>${selectedDevice === 'mobile' ? 'Swipe or tap the buttons below' : 'Use arrow keys or the buttons below'}</span>
            </div>
          </div>
          <div class="hud-grid">
            <div class="metric"><span class="label">Score</span><span class="value" id="tile-score">0</span></div>
            <div class="metric"><span class="label">Best</span><span class="value" id="tile-best">0</span></div>
            <div class="metric"><span class="label">Status</span><span class="value" id="tile-status">Running</span></div>
          </div>
          <div class="message-line" id="tile-message">Slide tiles together and build your way to 2048.</div>
          <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
            <button class="btn-small" id="tile-reset">New game</button>
            <span style="color:#cfe4ea;">${selectedDevice === 'mobile' ? 'Use the on-screen buttons for a compact mobile layout.' : 'Use the arrow keys for desktop play.'}</span>
          </div>
          <div class="mobile-controls" id="tile-mobile-controls" style="display:${selectedDevice === 'mobile' ? 'flex' : 'none'};">
            <button class="control-btn" type="button" data-dir="left">←</button>
            <button class="control-btn" type="button" data-dir="up">↑</button>
            <button class="control-btn" type="button" data-dir="down">↓</button>
            <button class="control-btn" type="button" data-dir="right">→</button>
          </div>
          <div id="tile-board" class="tile-grid"></div>
        </div>`;

      const boardEl = document.getElementById('tile-board');
      const scoreEl = document.getElementById('tile-score');
      const bestEl = document.getElementById('tile-best');
      const statusEl = document.getElementById('tile-status');
      const messageEl = document.getElementById('tile-message');
      const resetBtn = document.getElementById('tile-reset');
      const mobileButtons = Array.from(document.querySelectorAll('[data-dir]'));
      let board = Array.from({ length: 4 }, () => Array(4).fill(0));
      let score = 0;
      let best = 0;
      let over = false;

      function updateHud() {
        scoreEl.textContent = score;
        bestEl.textContent = best;
        statusEl.textContent = over ? 'Game over' : 'Running';
      }

      function createTile(value) {
        const cell = document.createElement('div');
        cell.className = 'tile-cell';
        cell.dataset.value = value;
        cell.textContent = value || '';
        return cell;
      }

      function render() {
        boardEl.innerHTML = '';
        board.forEach(row => row.forEach(value => boardEl.appendChild(createTile(value))));
        updateHud();
      }

      function addRandomTile() {
        const empty = [];
        board.forEach((row, r) => row.forEach((value, c) => { if (!value) empty.push([r, c]); }));
        if (!empty.length) {
          over = true;
          messageEl.textContent = 'No moves left. Start a new game.';
          return;
        }
        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
      }

      function reset() {
        board = Array.from({ length: 4 }, () => Array(4).fill(0));
        score = 0;
        over = false;
        addRandomTile();
        addRandomTile();
        messageEl.textContent = 'Slide tiles together and build your way to 2048.';
        render();
      }

      function slide(row) {
        const values = row.filter(Boolean);
        const merged = [];
        for (let i = 0; i < values.length; i += 1) {
          if (values[i] === values[i + 1]) {
            const sum = values[i] * 2;
            merged.push(sum);
            score += sum;
            best = Math.max(best, score);
            i += 1;
          } else {
            merged.push(values[i]);
          }
        }
        while (merged.length < 4) merged.push(0);
        return merged;
      }

      function move(direction) {
        if (over) return;
        let moved = false;
        const oldBoard = JSON.stringify(board);
        if (direction === 'left') {
          board = board.map(row => slide(row));
        } else if (direction === 'right') {
          board = board.map(row => slide([...row].reverse()).reverse());
        } else if (direction === 'up') {
          const cols = Array.from({ length: 4 }, (_, c) => board.map(row => row[c]));
          const movedCols = cols.map(col => slide(col));
          board = Array.from({ length: 4 }, (_, r) => movedCols.map(col => col[r]));
        } else if (direction === 'down') {
          const cols = Array.from({ length: 4 }, (_, c) => board.map(row => row[c]).reverse());
          const movedCols = cols.map(col => slide(col).reverse());
          board = Array.from({ length: 4 }, (_, r) => movedCols.map(col => col[r]));
        }
        moved = JSON.stringify(board) !== oldBoard;
        if (moved) {
          addRandomTile();
          render();
        }
      }

      function handleKeyDown(event) {
        const key = event.key.toLowerCase();
        if (key === 'arrowleft') { event.preventDefault(); move('left'); }
        if (key === 'arrowright') { event.preventDefault(); move('right'); }
        if (key === 'arrowup') { event.preventDefault(); move('up'); }
        if (key === 'arrowdown') { event.preventDefault(); move('down'); }
      }

      mobileButtons.forEach(button => button.addEventListener('click', () => move(button.dataset.dir)));
      resetBtn.addEventListener('click', reset);
      window.addEventListener('keydown', handleKeyDown);
      activeCleanup = () => { window.removeEventListener('keydown', handleKeyDown); };
      reset();
    }

    function loadGame(game) {
      clearGameScreen();
      if (game === '2048') start2048Game();
    }

    showGateStep('device');
  </script>
</body>
</html>
